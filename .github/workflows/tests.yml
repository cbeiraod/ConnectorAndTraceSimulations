name: Python Unit Tests

# Run this workflow on all pushes and pull requests to the main branch
on:
  push:
    branches: [ "main" ]
    paths:
      - 'tests/*'
      - 'rf_sim/helper.py'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'tests/*'
      - 'rf_sim/*'
      - '.github/workflows/tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    # Test against multiple recent Python versions
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    container:
      # Dynamically pull the exact image version we built for this matrix job
      image: ghcr.io/cbeiraod/openems-docker-env:${{ matrix.python-version }}

    # Map the container's working directory to the GitHub workspace
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run tests with Pytest
      # We set PYTHONPATH to the current directory so that 'import rf_sim.helper'
      # resolves correctly without needing to formally install the package via setup.py
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        python -m pytest tests/ -v